name: Linting

on: pull_request

jobs:

  ruff:

    name: Ruff

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        
        with: 
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .
      
      - name: Format check
        run: ruff format --check . --diff