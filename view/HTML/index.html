<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Gerenciador de Agentes</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-section left">
            <span class="logo">Gerenciador de Agentes</span>
        </div>

        <div class="nav-section central">
            <a href="#" class="agent-btn active">Agentes</a>
        </div>

        <div class="nav-section right">
            <a href="#" class="agent-btn">Perfil</a>
        </div>
    </nav>

    <div class="main-actions">
        <button id="abrirModal" class="create-agent-btn">+ Criar Novo Agente</button>
    </div>

    <dialog id="modalAgente">
        <form method="dialog">
            <h2>Novo Agente</h2>
            
            <label for="nome">Nome do Agente:</label>
            <input type="text" id="nome" placeholder="Ex: Atendente de Suporte" required>

            <label for="funcao">Instruções:</label>
            <textarea id="funcao" placeholder="O que este agente deve fazer?" required></textarea>

            <label for="token">Token do Telegram:</label>
            <input type="text" id="tokenTelegram" placeholder="Token do Bot Father" required>

            <div class="modal-buttons">
                <button type="submit" class="save-btn">Salvar Agente</button>
                <button type="button" id="fecharModal" class="cancel-btn">Cancelar</button>
            </div>
        </form>
    </dialog>
    
    <script src="../JS/index.js"></script>
</body>
</html>
