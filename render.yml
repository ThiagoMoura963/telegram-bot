services:
  - type: web
    name: telegram-bot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    buildFilter:
      ignoredPaths:
        - frontend/**
      includedPaths:
        - backend/**
        - index.py
        - requirements.txt