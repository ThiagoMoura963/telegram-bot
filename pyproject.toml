[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # erros de estilo (pycodestyle)
    "F",   # erros lógicos (pyflakes)
    "I",   # ordem de imports (isort)
    "B",   # bugs comuns (flake8-bugbear)
]

[tool.ruff.format]
quote-style = "single"

[tool.mypy]
strict = true
