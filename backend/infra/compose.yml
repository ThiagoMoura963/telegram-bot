services:
  database:
    image: pgvector/pgvector:pg16
    container_name: bd-tcc
    restart: unless-stopped
    env_file:
      - ../../.env.development
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis-tcc
    restart: unless-stopped
    ports:
      - "6379:6379"