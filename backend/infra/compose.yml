services:
  database:
    image: pgvector/pgvector:pg16
    container_name: bd-tcc
    restart: unless-stopped
    env_file:
      - ../../.env.development
    ports:
      - "5432:5432"
    volumes:
      - pgdata_tcc:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-tcc
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pgdata_tcc:
  redis_data:
