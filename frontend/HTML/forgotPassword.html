<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/forgotPassword.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Alterar a senha</title>
</head>
<body>
    <div class="forgot-box">
        <div class="forgot-header">
            <header>Esqueci a Senha</header>
        </div>
        <div class="instruction">
            <p>Insira o email cadastrado para receber o código para recuperação de conta</p>
        </div>
        <div class="input-box">
            <label for="email">Email</label>
            <input id="email" type="text" class="input-field" 
                placeholder="Exemplo@email.com" autocomplete="off" required>
        </div>
        <div class="input-submit">
            <button class="submit-btn" id="submit">Enviar email</button>
            <label for="submit">Enviar email</label>
        </div>
        <div class="cancel">
            <section>
                <a href="login.html">Cancelar</a>
            </section>
        </div>
    </div>
</body>
</html>
