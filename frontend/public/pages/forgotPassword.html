<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/forgotPassword.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/frontend/public/assets/robot-ico.png"
    />
    <title>Alterar a senha</title>
  </head>
  <body>
    <div class="forgot-box">
      <div class="forgot-header">
        <header>Esqueci a Senha</header>
      </div>
      <div class="instruction">
        <p>
          Insira o email cadastrado para receber o código para recuperação de
          conta
        </p>
      </div>
      <div class="input-box">
        <label for="email">Email</label>
        <input
          id="email"
          type="text"
          class="input-field"
          placeholder="Exemplo@email.com"
          autocomplete="off"
          required
        />
        <span id="email-error" class="error-text"></span>
      </div>
      <div class="input-submit">
        <button class="submit-btn" id="submit">
          <span class="btn-text">Enviar email</span>
          <span class="spinner"></span>
        </button>
      </div>

      <div class="cancel">
        <section>
          <a href="login.html">Cancelar</a>
        </section>
      </div>
    </div>

    <script type="module" src="../js/forgotPassword.js"></script>
  </body>
</html>
