<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title>Gerenciador de Agentes - Home</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-section left">
        <span class="logo">Gerenciador de Agentes</span>
      </div>

      <div class="nav-section right">
        <button class="exit-btn">Sair</button>
      </div>
    </nav>

    <section class="agents-grid" id="gridAgents"></section>

    <div class="main-actions">
      <button id="openModal" class="create-agent-btn" onclick="addAgent()">
        + Adicionar Agente
      </button>
    </div>

    <dialog id="modalAgent">
      <form method="dialog">
        <h2>Novo Agente</h2>

        <label for="name">Nome do Agente:</label>
        <input
          type="text"
          id="name"
          placeholder="Ex: Atendente de Suporte"
          required
        />

        <label for="description">Descrição:</label>
        <textarea
          id="description"
          placeholder="Descrição do Agente"
          required
        ></textarea>

        <label for="intruction">Instruções:</label>
        <textarea
          id="instruction"
          placeholder="O que este agente deve fazer?"
          required
        ></textarea>

        <label for="token">Token do Telegram:</label>
        <input
          type="text"
          id="tokenTelegram"
          placeholder="Token do Bot Father"
          required
        />
        <a
          href="https://telegram.me/BotFather"
          target="_blank"
          rel="noopener noreferrer"
          class="link-BotFather"
          >Não possui token?</a
        >

        <div class="modal-buttons">
          <button type="submit" id="saveAdd" class="save-btn">
            Salvar Agente
          </button>
          <button type="button" id="closeModalAdd" class="cancel-btn">
            Cancelar
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="modalConfig">
      <form method="dialog">
        <h2>Configurar agente</h2>

        <label for="name">Nome do Agente:</label>
        <input type="text" id="nameConfig" value="" required />

        <label for="description">Descrição:</label>
        <textarea
          id="descriptionConfig"
          placeholder="Descrição do Agente"
          required
        ></textarea>

        <label for="intruction">Instruções:</label>
        <textarea id="instructionConfig" required></textarea>

        <label for="token">Token do Telegram:</label>
        <input
          type="text"
          id="tokenTelegramConfig"
          placeholder="Token do Bot Father"
          required
        />
        <a
          href="https://telegram.me/BotFather"
          target="_blank"
          rel="noopener noreferrer"
          class="link-BotFather"
          >Não possui token?</a
        >

        <div class="modal-buttons">
          <button type="submit" id="saveConfig" class="save-btn">
            Salvar Agente
          </button>
          <button type="button" id="closeModalConfig" class="cancel-btn">
            Cancelar
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="../js/dashboard.js"></script>
  </body>
</html>
