<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/resetPassword.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/frontend/public/assets/robot-ico.png"
    />
    <title>Alterar senha</title>
  </head>
  <body>
    <div class="reset-box">
      <div class="reset-header">
        <header>Alterar senha</header>
      </div>

      <form id="reset-form">
        <div class="input-box">
          <label for="password">Nova Senha</label>
          <div class="password-container">
            <input
              id="password"
              type="password"
              class="input-field"
              placeholder="Insira a nova senha"
              autocomplete="off"
              required
            />
            <i class="fa-solid fa-eye" id="togglePassword"></i>
          </div>
          <span id="password-error" class="error-text"></span>
        </div>

        <div class="input-box">
          <label for="confirmPassword">Confirmar Senha</label>
          <div class="password-container">
            <input
              id="confirmPassword"
              type="password"
              class="input-field"
              placeholder="Confirme a nova senha"
              autocomplete="off"
              required
            />
            <i class="fa-solid fa-eye" id="confirmTogglePassword"></i>
          </div>
          <span id="confirmPassword-error" class="error-text"></span>
        </div>

        <div
          id="general-error"
          class="error-text"
          style="text-align: center; margin-bottom: 10px"
        ></div>

        <div class="input-submit">
          <button type="submit" class="submit-btn" id="submit">
            <span class="btn-text">Alterar Senha</span>
            <span class="spinner"></span>
          </button>
        </div>
      </form>

      <div class="cancel">
        <section>
          <a href="login.html">Cancelar</a>
        </section>
      </div>
    </div>

    <script type="module" src="../js/resetPassword.js"></script>
  </body>
</html>
