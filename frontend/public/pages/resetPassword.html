<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/resetPassword.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Alterar senha</title>
</head>
<body>
    <div class="reset-box">
        <div class="reset-header">
            <header>Alterar senha</header>
        </div>
        <div class="input-box">
            <label for="password">Senha</label>
            <div class="password-container">
                <input id="password" type="password" class="input-field" placeholder="Insira a senha" autocomplete="off" required>
                <i class="fa-solid fa-eye" id="togglePassword"></i>
        </div>
        <div class="input-box">
            <label for="password">Confirmar Senha</label>
            <div class="password-container">
                <input id="confirmPassword" type="password" class="input-field" placeholder="Confirme a senha" autocomplete="off" required>
                <i class="fa-solid fa-eye" id="confirmTogglePassword"></i>
            </div>
        </div>
        <div class="input-submit">
            <button class="submit-btn" id="submit">Alterar</button>
            <label for="submit">Alterar</label>
        </div>
        <div class="cancel">
            <section>
                <a href="login.html">Cancelar</a>
            </section>
        </div>
    </div>

    <script src="../js/resetPassword.js"></script>
</body>
</html>
